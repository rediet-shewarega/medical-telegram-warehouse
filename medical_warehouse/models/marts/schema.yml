version: 2

models:
  - name: dim_channels
    description: "Dimension table containing Telegram channel information."
    columns:
      - name: channel_key
        description: "Surrogate key for each Telegram channel."
        tests:
          - unique
          - not_null

      - name: channel_name
        description: "Cleaned Telegram channel name."
        tests:
          - unique
          - not_null

      - name: channel_type
        description: "Business category of the channel, such as Pharmaceutical, Cosmetics, or Medical."
        tests:
          - not_null

      - name: total_posts
        description: "Total number of scraped posts from the channel."
        tests:
          - not_null

  - name: dim_dates
    description: "Dimension table containing calendar date attributes."
    columns:
      - name: date_key
        description: "Date key in YYYYMMDD format."
        tests:
          - unique
          - not_null

      - name: full_date
        description: "Calendar date."
        tests:
          - unique
          - not_null

      - name: year
        description: "Year number."
        tests:
          - not_null

      - name: month
        description: "Month number."
        tests:
          - not_null

  - name: fct_messages
    description: "Fact table containing cleaned Telegram messages and engagement metrics."
    columns:
      - name: message_key
        description: "Unique key created from channel name and Telegram message ID."
        tests:
          - unique
          - not_null

      - name: message_id
        description: "Original Telegram message ID. This may repeat across different channels."
        tests:
          - not_null

      - name: channel_key
        description: "Foreign key linking messages to dim_channels."
        tests:
          - not_null
          - relationships:
              to: ref('dim_channels')
              field: channel_key

      - name: date_key
        description: "Foreign key linking messages to dim_dates."
        tests:
          - not_null
          - relationships:
              to: ref('dim_dates')
              field: date_key

      - name: message_text
        description: "Cleaned text content of the Telegram message."
        tests:
          - not_null

      - name: view_count
        description: "Number of views on the Telegram message."
        tests:
          - not_null

      - name: forward_count
        description: "Number of forwards on the Telegram message."
        tests:
          - not_null